name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  nomo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Release Build
        run: cargo build --workspace --release --locked

      - name: Compiler clean-build and check latency gate
        run: >-
          python3 scripts/compiler_release_gate.py
          --nomo target/release/nomo
          --output performance/results/compiler-release-gate.json

      - name: Upload compiler release-gate evidence
        uses: actions/upload-artifact@v7
        with:
          name: nomo-compiler-release-gate
          path: performance/results/compiler-release-gate.json
          if-no-files-found: error

      - name: Check Example Formatting
        run: cargo run --bin nomo -- fmt --check examples

      - name: Check Standard Library Formatting
        run: cargo run --bin nomo -- fmt --check std

      - name: Check Workspace Example
        run: cargo run --bin nomo -- check --workspace examples/workspace_basic

      - name: Test Workspace Example
        run: cargo run --bin nomo -- test --workspace examples/workspace_basic

      - name: Document Workspace Example
        run: cargo run --bin nomo -- doc --workspace examples/workspace_basic

  macos-cross-build:
    name: Cross build macOS arm64 to x86_64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Nomo
        run: cargo build --locked --release --bin nomo

      - name: Link a real x86_64 Mach-O from the arm64 host
        shell: bash
        run: |
          test "$(uname -m)" = "arm64"
          target/release/nomo build examples/result_helpers --target x86_64-apple-darwin
          artifact="examples/result_helpers/build/x86_64-apple-darwin-none/bin/result_helpers"
          test "$(lipo -archs "$artifact")" = "x86_64"
          file "$artifact" | grep "Mach-O 64-bit executable x86_64"
          grep 'nomo target: x86_64-apple-darwin-none' \
            examples/result_helpers/build/x86_64-apple-darwin-none/c/main.c

      - name: Upload cross-build evidence
        uses: actions/upload-artifact@v7
        with:
          name: nomo-macos-arm64-to-x86_64
          path: examples/result_helpers/build/x86_64-apple-darwin-none
          if-no-files-found: error

  linux-cross-build:
    name: Cross build Linux x86_64 to arm64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install arm64 GNU toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu qemu-user

      - name: Build Nomo
        run: cargo build --locked --release --bin nomo

      - name: Link and execute a real arm64 ELF from the x86_64 host
        shell: bash
        run: |
          test "$(uname -m)" = "x86_64"
          target/release/nomo build examples/result_helpers --target aarch64-unknown-linux-gnu
          artifact="examples/result_helpers/build/aarch64-unknown-linux-gnu/bin/result_helpers"
          readelf -h "$artifact" | grep 'Machine:.*AArch64'
          file "$artifact" | grep 'ELF 64-bit.*ARM aarch64'
          qemu-aarch64 -L /usr/aarch64-linux-gnu "$artifact"
          grep 'nomo target: aarch64-unknown-linux-gnu' \
            examples/result_helpers/build/aarch64-unknown-linux-gnu/c/main.c

      - name: Upload cross-build evidence
        uses: actions/upload-artifact@v7
        with:
          name: nomo-linux-x86_64-to-arm64
          path: examples/result_helpers/build/aarch64-unknown-linux-gnu
          if-no-files-found: error

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    env:
      ASSET_NAME: nomo-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --locked --workspace --release --target ${{ matrix.target }}

      - name: Package Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir release
          cp "target/${{ matrix.target }}/release/nomo" release/
          cp "target/${{ matrix.target }}/release/nomoc" release/
          cp README.md LICENSE release/
          tar -C release -czf "$ASSET_NAME" nomo nomoc README.md LICENSE

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item "target/${{ matrix.target }}/release/nomo.exe" release/
          Copy-Item "target/${{ matrix.target }}/release/nomoc.exe" release/
          Copy-Item README.md, LICENSE release/
          Compress-Archive -Path release/* -DestinationPath $env:ASSET_NAME

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag version
        shell: bash
        run: |
          workspace_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ "$GITHUB_REF_NAME" != "v$workspace_version" ]]; then
            echo "tag $GITHUB_REF_NAME does not match workspace version $workspace_version" >&2
            exit 1
          fi

      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum nomo-* > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --generate-notes \
              --verify-tag \
              --title "Nomo $GITHUB_REF_NAME"
          fi

[package]
name = "nomo"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
toml = "0.8"

[lib]
name = "nomo"
path = "src/lib.rs"

[[bin]]
name = "nomo"
path = "src/bin/nomo.rs"

[[bin]]
name = "nomoc"
path = "src/bin/nomoc.rs"

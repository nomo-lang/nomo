[package]
name = "nomo"
version.workspace = true
edition.workspace = true
license.workspace = true

[workspace]
resolver = "2"
members = ["."]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
toml = "0.8"

[dependencies]
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
toml.workspace = true

[lib]
name = "nomo"
path = "src/lib.rs"

[[bin]]
name = "nomo"
path = "src/bin/nomo.rs"

[[bin]]
name = "nomoc"
path = "src/bin/nomoc.rs"
